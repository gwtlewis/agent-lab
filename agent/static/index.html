<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agent Lab</title>
  <link rel="icon" type="image/svg+xml" href="/static/icon.svg" />
  <link rel="stylesheet" href="/static/vendor/github-dark.min.css" />
  <link rel="stylesheet" href="/static/vendor/katex.min.css" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <!-- ── Header ──────────────────────────────────────────────────────────── -->
  <header class="header">
    <div class="header-inner">
      <div class="header-title">
        <span class="app-icon">
          <img src="/static/icon.svg" width="24" height="24" alt="Agent Lab Icon" />
        </span>
        <span class="app-name">Agent Lab</span>
      </div>
      <div class="header-meta">
        <label class="theme-select-wrap" for="theme-select" aria-label="Theme mode">
          <span class="theme-select-label">Theme</span>
          <select id="theme-select" class="theme-select">
            <option value="auto">Auto</option>
            <option value="light">Light</option>
            <option value="dark">Dark</option>
          </select>
        </label>
        <span id="provider-badge" class="badge badge--neutral">—</span>
        <span id="status-dot" class="status-dot status-dot--disconnected" title="Disconnected"></span>
      </div>
    </div>
  </header>

  <!-- ── Main layout ─────────────────────────────────────────────────────── -->
  <main class="main">

    <!-- Content row: transcript (left) + board panel (right, hidden by default) -->
    <div class="content-row" id="content-row">

      <!-- Transcript -->
      <section id="transcript" class="transcript" role="log" aria-live="polite" aria-label="Conversation">
        <div class="transcript-empty" id="empty-state">
          <div class="empty-icon">
            <img src="/static/icon.svg" width="48" height="48" alt="Agent Lab Icon" />
          </div>
          <p class="empty-title">How can I help?</p>
          <p class="empty-sub">Start a conversation below.</p>
          <div class="starter-prompts">
            <button class="btn btn--starter" type="button">Summarize a document</button>
            <button class="btn btn--starter" type="button">Write a Python script</button>
            <button class="btn btn--starter" type="button">Explain neural networks</button>
            <button class="btn btn--starter" type="button">Draw a CVA vs DVA comparison chart</button>
            <button class="btn btn--starter" type="button">Show a portfolio risk table</button>
          </div>
        </div>
      </section>

      <!-- Board panel: shown when agent calls render_dashboard -->
      <aside id="board-panel" class="board-panel" hidden>
        <div class="board-header">
          <span class="board-title">Dashboard</span>
          <button id="board-close-btn" class="btn btn--ghost btn--small" aria-label="Close dashboard">✕</button>
        </div>
        <iframe id="board-frame" class="board-frame" sandbox="allow-scripts" title="Dashboard"></iframe>
      </aside>

    </div><!-- /.content-row -->

    <!-- Input area -->
    <div class="input-area">
      <div class="input-row">
        <textarea
          id="user-input"
          class="input-textarea"
          placeholder="Message…"
          rows="1"
          aria-label="Message input"
          autofocus
        ></textarea>
        <div class="input-actions">
          <button id="stop-btn" class="btn btn--icon btn--stop" title="Stop" aria-label="Stop generation" hidden>
            <svg viewBox="0 0 20 20" fill="currentColor" width="18" height="18">
              <rect x="4" y="4" width="12" height="12" rx="2"/>
            </svg>
          </button>
          <button id="send-btn" class="btn btn--primary" title="Send (Enter)" aria-label="Send">
            <svg viewBox="0 0 20 20" fill="currentColor" width="18" height="18">
              <path d="M3.105 3.105a1.5 1.5 0 012.01-.14l12 7.5a1.5 1.5 0 010 2.57l-12 7.5a1.5 1.5 0 01-2.26-1.65L4.5 12H10a.5.5 0 000-1H4.5L2.855 4.895a1.5 1.5 0 01.25-1.79z"/>
            </svg>
          </button>
        </div>
      </div>
      <div class="input-footer">
        <button id="clear-btn" class="btn btn--ghost btn--small">Clear conversation</button>
        <label class="reasoning-toggle-label-inline">
          <input type="checkbox" id="reasoning-checkbox" checked />
          Deep Thinking
        </label>
      </div>
    </div>
  </main>

  <script src="/static/vendor/marked.min.js"></script>
  <script src="/static/vendor/purify.min.js"></script>
  <script src="/static/vendor/katex.min.js"></script>
  <script src="/static/vendor/highlight.min.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
